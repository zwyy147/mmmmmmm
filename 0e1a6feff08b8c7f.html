<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=422, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的小手机们 ₊˚⊹</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Noto+Serif+SC:wght@300;400&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== 全局 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.4s;
}

/* ===== 页面切换 ===== */
.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* ============================================================
   主页 - 手机导航
============================================================ */
#page-home {
  position: relative;
  padding-bottom: 90px;
}

/* 背景层 */
#home-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  min-width: 100%;
  min-height: 100%;
  z-index: 0;
  background: linear-gradient(135deg, #c8dfc9 0%, #dff0de 40%, #b8d4bb 100%);
  transition: background 0.3s;
}
#home-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(255,255,255,0.28) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(140,190,140,0.18) 0%, transparent 70%);
}

.blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.18; pointer-events: none; z-index: 0; }
.blob1 { width: 300px; height: 300px; background: #5d9e62; top: -80px; left: -80px; }
.blob2 { width: 200px; height: 200px; background: #a3c9a8; bottom: 100px; right: -60px; }
.blob3 { width: 150px; height: 150px; background: #7ab87f; top: 50%; left: 60%; }

/* 内容层 */
.home-content { position: relative; z-index: 1; }

header.home-header {
  text-align: center;
  padding: 48px 20px 24px;
}


h1.home-title {
  font-family: 'Noto Serif SC', serif;
  font-weight: 300;
  font-size: 1.5rem;
  color: #4e7554;
  letter-spacing: 0.08em;
}
.home-subtitle { margin-top: 4px; font-size: 0.78rem; color: #7a9e7e; letter-spacing: 0.15em; }

.search-wrap-home {
  position: relative;
  max-width: 380px;
  margin: 0 auto 28px;
  padding: 0 20px;
}
.search-input-home {
  width: 100%;
  padding: 10px 18px;
  border-radius: 50px;
  border: 1.5px solid rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(12px);
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  color: #4e7554;
  outline: none;
  transition: border 0.2s, box-shadow 0.2s;
}
.search-input-home::placeholder { color: #a8c5ac; }
.search-input-home:focus { border-color: #a8c5ac; box-shadow: 0 0 0 3px rgba(168,197,172,0.25); }

/* 卡片网格 */
.grid-home {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  padding: 0 16px;
  max-width: 480px;
  margin: 0 auto;
}

.phone-card {
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(14px);
  border: 1.5px solid rgba(255,255,255,0.7);
  border-radius: 20px;
  padding: 16px 8px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 4px 24px rgba(90,130,95,0.13);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.4s ease both;
}
.phone-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
  border-radius: 20px 20px 0 0;
  pointer-events: none;
}
@keyframes cardIn { from{opacity:0;transform:translateY(16px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
.phone-card:active { transform: scale(0.94); }

.card-icon-home {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, #d4e8d6, #eaf3eb);
  border: 1.5px solid rgba(255,255,255,0.8);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  box-shadow: 0 2px 8px rgba(100,150,100,0.15);
}
.card-name-home {
  font-size: 0.72rem;
  color: #4e7554;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
  word-break: break-all;
}

.delete-btn-home {
  position: absolute; top: 5px; right: 5px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(180,80,80,0.18);
  border: none; color: #c05050;
  font-size: 0.75rem; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  z-index: 2;
}
body.edit-mode .delete-btn-home { display: flex; }
body.edit-mode .phone-card { animation: wiggle 0.5s ease infinite alternate; }
@keyframes wiggle { from{transform:rotate(-1deg)} to{transform:rotate(1deg)} }

.home-empty {
  grid-column: 1/-1; text-align: center;
  padding: 40px 0; color: #7a9e7e; font-size: 0.85rem;
}

/* 底部FAB */
.fab-area {
  position: fixed; bottom: 24px; left: 0; right: 0;
  z-index: 10; display: flex; justify-content: center; gap: 10px;
  flex-wrap: wrap; padding: 0 16px;
}
.fab {
  padding: 11px 18px; border-radius: 50px; border: none;
  font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 20px rgba(90,140,95,0.25);
  transition: transform 0.15s; display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.fab:active { transform: scale(0.95); }
.fab-add { background: linear-gradient(135deg, #7a9e7e, #4e7554); color: white; }
.fab-edit {
  background: rgba(255,255,255,0.55); backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255,255,255,0.7); color: #4e7554;
}
body.edit-mode .fab-edit { background: rgba(255,200,200,0.5); border-color: rgba(200,100,100,0.3); color: #b05050; }
.fab-bg {
  background: rgba(255,255,255,0.55); backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255,255,255,0.7); color: #4e7554;
}
.fab-api {
  background: rgba(0,200,107,0.15); backdrop-filter: blur(12px);
  border: 1.5px solid rgba(0,200,107,0.3); color: #007a3d;
}

/* 添加手机弹窗 */
.modal-overlay-home {
  display: none; position: fixed; inset: 0;
  background: rgba(80,120,85,0.25); backdrop-filter: blur(6px);
  z-index: 20; align-items: flex-end; justify-content: center;
}
.modal-overlay-home.open { display: flex; }
.modal-home {
  background: linear-gradient(160deg, #f0f8f0, #e2f0e3);
  border-radius: 28px 28px 0 0;
  padding: 28px 24px 40px;
  width: 100%; max-width: 480px;
  box-shadow: 0 -8px 40px rgba(80,130,85,0.18);
  animation: slideUp 0.3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.modal-home h2 {
  font-family: 'Noto Serif SC', serif; font-weight: 400;
  font-size: 1.1rem; color: #4e7554; margin-bottom: 20px; text-align: center;
}
.field-home { margin-bottom: 14px; }
.field-home label { display: block; font-size: 0.75rem; color: #7a9e7e; font-weight: 600; margin-bottom: 5px; }
.field-home input {
  width: 100%; padding: 11px 16px; border-radius: 14px;
  border: 1.5px solid rgba(168,197,172,0.5);
  background: rgba(255,255,255,0.7);
  font-family: 'Nunito', sans-serif; font-size: 0.9rem; color: #4e7554; outline: none;
  transition: border 0.2s;
}
.field-home input:focus { border-color: #a8c5ac; background: rgba(255,255,255,0.9); }

.emoji-grid-home { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.emoji-btn-home {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1.5px solid transparent; background: rgba(255,255,255,0.6);
  font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border 0.15s, transform 0.15s;
}
.emoji-btn-home:active { transform: scale(0.9); }
.emoji-btn-home.selected { border-color: #7a9e7e; background: #eaf3eb; }

.modal-btns-home { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel-home {
  flex: 1; padding: 12px; border-radius: 14px;
  border: 1.5px solid rgba(168,197,172,0.5); background: transparent;
  font-family: 'Nunito', sans-serif; font-size: 0.9rem; color: #7a9e7e; cursor: pointer;
}
.btn-save-home {
  flex: 2; padding: 12px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #7a9e7e, #4e7554);
  font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700;
  color: white; cursor: pointer; box-shadow: 0 3px 12px rgba(90,140,95,0.3);
}


/* ============================================================
   API Vault 页面
============================================================ */
#page-api {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  transition: all 0.4s ease;
}

:root {
  --g1: #00ff87; --g2: #00c96b; --g3: #00a855; --g4: #007a3d; --g5: #004d26;
  --bg: #050f09; --bg2: #0a1f12; --bg3: #0f2d1a;
  --card: #0d2416; --card2: #112b1c;
  --border: #1a3d28; --border2: #00ff8730;
  --text: #e8f5ee; --text2: #7aad8f; --text3: #3d6b50;
  --danger: #ff4d6d; --warn: #ffb347;
  --shadow: 0 8px 32px #00000066; --glow: 0 0 20px #00ff8720;
}
[data-theme="light"] {
  --bg: #f0faf4; --bg2: #e2f5ea; --bg3: #d0edda;
  --card: #ffffff; --card2: #f5fdf8;
  --border: #b8dfc6; --border2: #00a85540;
  --text: #0d2416; --text2: #2d6b47; --text3: #7ab894;
  --shadow: 0 8px 32px #00000016; --glow: 0 0 20px #00a85518;
}

#page-api::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 20%, #00ff8709 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #00c96b06 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

.api-app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }

.api-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 12px;
}
.api-logo { display: flex; align-items: center; gap: 12px; }
.api-logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--g1), var(--g3));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: var(--glow);
}
.api-logo h1 {
  font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(90deg, var(--g1), var(--g2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.api-logo span { font-size: 11px; color: var(--text3); display: block; font-weight: 300; margin-top: -2px; }

.api-header-actions { display: flex; gap: 10px; align-items: center; }

.btn-back {
  background: var(--card); border: 1px solid var(--border); color: var(--text2);
  padding: 0 14px; height: 38px; border-radius: 10px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 13px;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s;
}
.btn-back:hover { border-color: var(--g3); color: var(--g1); }

.btn-theme-api {
  background: var(--card); border: 1px solid var(--border); color: var(--text2);
  width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.btn-theme-api:hover { border-color: var(--g3); color: var(--g1); box-shadow: var(--glow); }

.btn-primary-api {
  background: linear-gradient(135deg, var(--g2), var(--g4));
  border: none; color: #fff; padding: 0 18px; height: 38px; border-radius: 10px;
  cursor: pointer; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap;
}
.btn-primary-api:hover { transform: translateY(-1px); box-shadow: 0 4px 20px #00c96b40; }

.api-toolbar { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
.api-search-wrap { flex: 1; min-width: 200px; position: relative; }
.api-search-wrap input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 10px 12px 10px 36px; border-radius: 10px;
  font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: all 0.2s;
}
.api-search-wrap input:focus { border-color: var(--g3); box-shadow: 0 0 0 3px var(--border2); }
.api-search-wrap::before {
  content: '⌕'; position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); color: var(--text3); font-size: 16px;
}
.filter-select {
  background: var(--card); border: 1px solid var(--border); color: var(--text2);
  padding: 10px 12px; border-radius: 10px; font-family: 'DM Mono', monospace;
  font-size: 13px; outline: none; cursor: pointer; transition: all 0.2s; min-width: 120px;
}
.filter-select:focus { border-color: var(--g3); }

.group-section { margin-bottom: 32px; }
.group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; cursor: pointer; user-select: none; }
.group-label { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--g2); }
.group-line { flex: 1; height: 1px; background: var(--border); }
.group-count { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 20px; }
.group-toggle { font-size: 12px; color: var(--text3); transition: transform 0.2s; }
.group-section.collapsed .group-toggle { transform: rotate(-90deg); }
.group-section.collapsed .group-cards { display: none; }
.group-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

.api-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px; transition: all 0.2s;
  position: relative; overflow: hidden; animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.api-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--g3), transparent); opacity: 0; transition: opacity 0.2s;
}
.api-card:hover { border-color: var(--border2); box-shadow: var(--shadow); transform: translateY(-2px); }
.api-card:hover::before { opacity: 1; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.card-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); word-break: break-word; }
.card-actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: 8px; }
.btn-icon {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text3);
  width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.btn-icon:hover { color: var(--g1); border-color: var(--g3); background: var(--bg2); }
.btn-icon.danger:hover { color: var(--danger); border-color: var(--danger); }

.card-field { margin-bottom: 10px; }
.card-field:last-child { margin-bottom: 0; }
.field-label { font-size: 10px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.field-value {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; font-size: 12px; color: var(--text2);
  display: flex; align-items: center; justify-content: space-between; gap: 8px; word-break: break-all;
}
.field-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.field-text.masked { letter-spacing: 2px; color: var(--text3); }
.btn-copy {
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 12px; padding: 2px 4px; border-radius: 4px; transition: all 0.15s; flex-shrink: 0;
}
.btn-copy:hover { color: var(--g1); }
.btn-copy.copied { color: var(--g1); }
.model-tag {
  display: inline-block; background: var(--bg3); border: 1px solid var(--border);
  color: var(--g2); font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500;
}

.api-empty-state { text-align: center; padding: 60px 20px; color: var(--text3); display: none; }
.api-empty-state.show { display: block; }
.api-empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.api-empty-state p { font-size: 14px; line-height: 1.8; }

/* API 弹窗 */
.api-modal-overlay {
  position: fixed; inset: 0; background: #00000088; backdrop-filter: blur(8px);
  z-index: 100; display: none; align-items: center; justify-content: center;
  padding: 20px; animation: overlayIn 0.2s ease;
}
.api-modal-overlay.open { display: flex; }
@keyframes overlayIn { from{opacity:0} to{opacity:1} }
.api-modal {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 18px; padding: 28px; width: 100%; max-width: 480px;
  box-shadow: var(--shadow), var(--glow); animation: modalIn 0.25s ease;
  max-height: 90vh; overflow-y: auto;
}
@keyframes modalIn { from{opacity:0;transform:scale(0.96) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }

.api-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.api-modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
.btn-close {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text3);
  width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.btn-close:hover { color: var(--danger); border-color: var(--danger); }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.form-label span { color: var(--danger); margin-left: 2px; }
.form-input, .form-select {
  width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
  padding: 10px 12px; border-radius: 10px; font-family: 'DM Mono', monospace;
  font-size: 13px; outline: none; transition: all 0.2s;
}
.form-input:focus, .form-select:focus { border-color: var(--g3); box-shadow: 0 0 0 3px var(--border2); }
.form-input::placeholder, input::placeholder { color: var(--text3); }
.form-select option { background: var(--card); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.new-group-input { display: none; margin-top: 8px; }
.new-group-input.show { display: block; }
.api-modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.btn-secondary {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  padding: 0 18px; height: 38px; border-radius: 10px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 13px; transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--g3); color: var(--g1); }

/* Toast */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  background: var(--card); border: 1px solid var(--border2); color: var(--text);
  padding: 12px 18px; border-radius: 12px; font-size: 13px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 8px; animation: toastIn 0.3s ease; min-width: 200px;
}
@keyframes toastIn { from{opacity:0;transform:translateY(8px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
.toast.fadeout { animation: toastOut 0.3s ease forwards; }
@keyframes toastOut { to{opacity:0;transform:translateY(4px)} }

/* 统计栏 */
.stats-bar { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.stat-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 16px; display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text2);
}
.stat-num { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--g1); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s||'').replace(/'/g,"\\'"); }

function toast(msg) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => { t.classList.add('fadeout'); setTimeout(() => t.remove(), 300); }, 2000);
}

=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\/line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\/line><\/svg><\/button>\n            <\/div>\n            <div class=\"modal-body-scroll\">\n                <div class=\"notice-important\">\u26a0\ufe0f \u8b66\u544a\uff1a\u3010\u7eaf\u524d\u7aef\uff0c\u5237\u65b0\u5373\u4e22\u5931\u3011<\/div>\n                <p>\u672c\u5de5\u5177\u57fa\u4e8e<b>\u7eaf\u672c\u5730\u524d\u7aef\u6280\u672f<\/b>\u6784\u5efa\uff0c\u60a8\u7684\u5361\u7247\u4ec5\u4fdd\u5b58\u5728\u5f53\u524d\u6d4f\u89c8\u5668\u7684\u4e34\u65f6\u7f13\u5b58\u4e2d\u3002<\/p>\n                <p>\u8fd9\u610f\u5473\u7740\uff1a<\/p>\n                <ul>\n                    <li>\u6211\u4eec<b>\u4e0d\u4f1a<\/b>\u6536\u96c6\u60a8\u7684\u4efb\u4f55\u6570\u636e\u3002<\/li>\n                    <li>\u4e00\u65e6\u60a8<b>\u5237\u65b0\u9875\u9762\u3001\u5173\u95ed\u6807\u7b7e\u9875\u6216\u6e05\u7406\u6d4f\u89c8\u5668\u7f13\u5b58<\/b>\uff0c\u672a\u5bfc\u51fa\u7684\u8fdb\u5ea6\u5c06\u6c38\u4e45\u4e22\u5931\u3002<\/li>\n                <\/ul>\n                <p><b>\u5efa\u8bae\uff1a<\/b>\u6574\u7406\u5b8c\u6bd5\u540e\uff0c\u52a1\u5fc5\u4f7f\u7528<b>\u300c\u5bfc\u51fa\u300d<\/b>\u529f\u80fd\u4e0b\u8f7d\u5907\u4efd\uff01<\/p>\n            <\/div>\n            <div class=\"modal-actions\">\n                <button class=\"btn\" onclick=\"closeModal('notice-modal')\">\u6211\u5df2\u4e86\u89e3<\/button>\n            <\/div>\n        <\/div>\n    <\/div>\n\n    <!-- \u89d2\u8272\u8be6\u60c5\u5f39\u7a97 -->\n    <div id=\"character-modal\" class=\"modal\">\n        <div class=\"modal-content\" style=\"max-width: 500px;\">\n            <div class=\"modal-header\">\n                <h2 id=\"modal-title\"><\/h2>\n                <button class=\"close-btn\" onclick=\"closeModal('character-modal')\"><svg viewBox=\"0 0 24 24\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\/line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\/line><\/svg><\/button>\n            <\/div>\n            <div class=\"modal-body-scroll\" id=\"modal-body\" style=\"white-space: pre-wrap; font-size: 14px;\"><\/div>\n            <div class=\"modal-actions\">\n                <button class=\"btn btn-secondary\" onclick=\"copyModalDesc()\">\n                    <svg viewBox=\"0 0 24 24\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\" ry=\"2\"><\/rect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\/path><\/svg>\n                    \u590d\u5236\u4eba\u8bbe\n                <\/button>\n            <\/div>\n        <\/div>\n    <\/div>\n\n    <!-- \u4e16\u754c\u4e66\u8be6\u60c5\u5f39\u7a97 -->\n    <div id=\"lore-modal\" class=\"modal\">\n        <div class=\"modal-content\" style=\"max-width:500px;\">\n            <div class=\"modal-header\">\n                <h2 id=\"lore-modal-title\"><\/h2>\n                <button class=\"close-btn\" onclick=\"closeModal('lore-modal')\"><svg viewBox=\"0 0 24 24\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\/line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\/line><\/svg><\/button>\n            <\/div>\n            <div class=\"modal-body-scroll\" id=\"lore-modal-body\" style=\"white-space:pre-wrap;font-size:14px;\"><\/div>\n            <div class=\"modal-actions\">\n                <button class=\"btn btn-secondary\" id=\"lore-copy-btn\" onclick=\"copyLoreContent()\">\n                    <svg viewBox=\"0 0 24 24\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\" ry=\"2\"><\/rect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\/path><\/svg>\n                    \u590d\u5236\u4e16\u754c\u4e66\n                <\/button>\n            <\/div>\n        <\/div>\n    <\/div>\n\n    <!-- \u65b0\u5efa\u6587\u4ef6\u5939\u5f39\u7a97\uff08\u4e09\u4e2a\u9762\u677f\u5171\u7528\uff09 -->\n    <div id=\"mkdir-modal\" class=\"modal\">\n        <div class=\"modal-content\" style=\"max-height: max-content;\">\n            <div class=\"modal-header\">\n                <h3>\u65b0\u5efa\u6587\u4ef6\u5939<\/h3>\n                <button class=\"close-btn\" onclick=\"closeModal('mkdir-modal')\"><svg viewBox=\"0 0 24 24\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\/line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\/line><\/svg><\/button>\n            <\/div>\n            <div class=\"modal-body-scroll\" style=\"padding-bottom:0;\">\n                <p id=\"mkdir-hint\" style=\"margin:0 0 10px; font-size:13px; color:var(--text-muted);\"><\/p>\n                <input type=\"text\" id=\"mkdir-input\" class=\"modal-input\" placeholder=\"\u8f93\u5165\u6587\u4ef6\u5939\u540d\u79f0\">\n            <\/div>\n            <div class=\"modal-actions\">\n                <button class=\"btn btn-secondary\" onclick=\"closeModal('mkdir-modal')\">\u53d6\u6d88<\/button>\n                <button class=\"btn\" onclick=\"mkdirConfirm()\">\u786e\u8ba4\u521b\u5efa<\/button>\n            <\/div>\n        <\/div>\n    <\/div>\n\n    <!-- \u79fb\u52a8\u5f39\u7a97\uff08\u4e09\u4e2a\u9762\u677f\u5171\u7528\uff0c\u6811\u5f62\u9009\u62e9\uff09 -->\n    <div id=\"move-modal\" class=\"modal\">\n        <div class=\"modal-content\" style=\"max-height: max-content; max-width:380px;\">\n            <div class=\"modal-header\">\n                <h3>\u79fb\u52a8\u5230...<\/h3>\n                <button class=\"close-btn\" onclick=\"closeModal('move-modal')\"><svg viewBox=\"0 0 24 24\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\/line><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\/line><\/svg><\/button>\n            <\/div>\n            <div class=\"modal-body-scroll\" style=\"padding:12px 16px; max-height:50vh;\">\n                <ul id=\"move-tree-list\" class=\"folder-tree-list\"><\/ul>\n            <\/div>\n            <div class=\"modal-actions\">\n                <button class=\"btn btn-secondary\" onclick=\"closeModal('move-modal')\">\u53d6\u6d88<\/button>\n                <button class=\"btn\" onclick=\"confirmMove()\">\u786e\u8ba4\u79fb\u52a8<\/button>\n            <\/div>\n        <\/div>\n    <\/div>\n\n    <!-- \u52a0\u8f7d\u52a8\u753b\u5f39\u7a97 -->\n    <div id=\"loading-modal\" class=\"modal\" style=\"z-index: 999;\">\n        <div class=\"modal-content\">\n            <div class=\"spinner\"><\/div>\n            <h3 id=\"loading-text\" style=\"text-shadow: 0 2px 4px rgba(0,0,0,0.5);\">\u6b63\u5728\u89e3\u6790\u5e95\u5c42\u6570\u636e...<\/h3>\n        <\/div>\n    <\/div>\n\n    <script>\n        // \u2605 \u5fc5\u987b\u63d0\u524d\u5b9a\u4e49\uff0ctab onclick \u9700\u8981\u5728DOM\u52a0\u8f7d\u65f6\u5c31\u80fd\u8bbf\u95ee\n        function switchMainTab(tab) {\n            ['cards','lorebooks','themes','html'].forEach(function(t) {\n                var el = document.getElementById('tab-' + t);\n                if (el) el.style.display = (t === tab) ? 'block' : 'none';\n            });\n            document.querySelectorAll('.main-tab').forEach(function(btn, i) {\n                btn.classList.toggle('active', ['cards','lorebooks','themes','html'][i] === tab);\n            });\n        }\n    <\/script>\n    <script src=\"https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js\"><\/script>\n    <script>\n        // ============================================================\n        // \u2605\u2605\u2605 \u901a\u7528\u6811\u5f62\u6587\u4ef6\u5939\u7cfb\u7edf FolderTree \u2605\u2605\u2605\n        // ============================================================\n        class FolderTree {\n            constructor() {\n                // folders: { id, name, parentId }\n                // \u6839\u8282\u70b9 id = 'root'\uff0c\u4e0d\u5b58\u5728\u4e8e\u6570\u7ec4\u4e2d\uff0cparentId=null \u8868\u793a\u5728\u6839\u4e0b\n                this.folders = [];\n                this.currentId = 'root'; // \u5f53\u524d\u6240\u5728\u6587\u4ef6\u5939 id\n            }\n            mkFolder(name, parentId) {\n                parentId = parentId || 'root';\n                const id = 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);\n                this.folders.push({ id, name, parentId });\n                return id;\n            }\n            // \u83b7\u53d6\u67d0\u6587\u4ef6\u5939\u7684\u76f4\u63a5\u5b50\u6587\u4ef6\u5939\n            children(parentId) {\n                parentId = parentId || 'root';\n                return this.folders.filter(f => f.parentId === parentId);\n            }\n            // \u83b7\u53d6\u67d0\u6587\u4ef6\u5939\u7684\u6240\u6709\u540e\u4ee3 id\uff08\u542b\u81ea\u8eab\uff09\n            descendants(folderId) {\n                const result = [folderId];\n                const queue = [folderId];\n                while (queue.length) {\n                    const pid = queue.shift();\n                    const kids = this.folders.filter(f => f.parentId === pid).map(f => f.id);\n                    result.push(...kids);\n                    queue.push(...kids);\n                }\n                return result;\n            }\n            // \u83b7\u53d6\u8def\u5f84\u6570\u7ec4 [{id,name},...] \u4ece\u6839\u5230\u5f53\u524d\n            path(folderId) {\n                folderId = folderId || this.currentId;\n                const parts = [];\n                let cur = folderId;\n                while (cur && cur !== 'root') {\n                    const f = this.folders.find(x => x.id === cur);\n                    if (!f) break;\n                    parts.unshift(f);\n                    cur = f.parentId;\n                }\n                return parts; // \u4e0d\u542b\u6839\u8282\u70b9\u672c\u8eab\uff0c\u6839\u8282\u70b9\u7528\"\u5168\u90e8\"\u663e\u793a\n            }\n            getFolderById(id) {\n                if (id === 'root') return { id: 'root', name: '\u5168\u90e8', parentId: null };\n                return this.folders.find(f => f.id === id) || null;\n            }\n            // \u5220\u9664\u6587\u4ef6\u5939\uff08\u542b\u540e\u4ee3\uff09\uff0c\u8fd4\u56de\u88ab\u5220 id \u5217\u8868\n            deleteFolder(folderId) {\n                if (folderId === 'root') return [];\n                const ids = this.descendants(folderId);\n                this.folders = this.folders.filter(f => !ids.includes(f.id));\n                return ids;\n            }\n            // \u6e32\u67d3\u6241\u5e73\u6811\u5f62\u5217\u8868\uff08\u7528\u4e8e\u79fb\u52a8\u9009\u62e9\u5668\uff09\uff0c\u8df3\u8fc7 skipIds\n            flatTree(skipIds) {\n                skipIds = skipIds || [];\n                const result = [];\n                const walk = (parentId, depth) => {\n                    const kids = this.children(parentId);\n                    kids.forEach(f => {\n                        if (!skipIds.includes(f.id)) {\n                            result.push({ ...f, depth });\n                            walk(f.id, depth + 1);\n                        }\n                    });\n                };\n                result.push({ id: 'root', name: '\u5168\u90e8\uff08\u6839\u76ee\u5f55\uff09', depth: 0 });\n                walk('root', 1);\n                return result;\n            }\n        }\n\n        // ============================================================\n        // \u2605 \u5e94\u7528\u72b6\u6001\n        // ============================================================\n        let appState = {\n            tree: new FolderTree(),\n            cards: [],     // { id, name, initial, description, color, folderId, imageUrl }\n            isDarkMode: false\n        };\n        let htmlState = {\n            tree: new FolderTree(),\n            tools: []      // { id, name, htmlContent, folderId }\n        };\n        let themesState = {\n            tree: new FolderTree(),\n            items: []\n        };\n        let loreState = {\n            tree: new FolderTree(),\n            cards: []      // { id, name, initial, description, color, folderId, imageUrl }\n        };\n        const colors = ['#6a93b0', '#7a9e7e', '#c97a7e', '#d8b068', '#6a8cb0', '#9b82c3', '#c982a3', '#d99368'];\n\n        // ============================================================\n        // \u2605 \u5171\u7528\uff1a\u65b0\u5efa\u6587\u4ef6\u5939\u5f39\u7a97 & \u79fb\u52a8\u5f39\u7a97\n        // ============================================================\n        let _mkdirContext = null; // { tree, onDone }\n        let _moveContext  = null; // { tree, getItems, setFolder, getBreadcrumbEl, getContainerEl, render }\n        let _moveSelected = 'root';\n\n        function openMkdirModal(tree, onDone) {\n            _mkdirContext = { tree, onDone };\n            const hint = document.getElementById('mkdir-hint');\n            const cur = tree.getFolderById(tree.currentId);\n            hint.innerText = '\u5728\u300c' + (cur ? cur.name : '\u5168\u90e8') + '\u300d\u4e0b\u65b0\u5efa\u6587\u4ef6\u5939';\n            document.getElementById('mkdir-input').value = '';\n            openModal('mkdir-modal');\n        }\n        function mkdirConfirm() {\n            if (!_mkdirContext) return;\n            const name = document.getElementById('mkdir-input').value.trim();\n            if (!name) return showToast('\u540d\u79f0\u4e0d\u80fd\u4e3a\u7a7a\uff01', 'error');\n            const { tree, onDone } = _mkdirContext;\n            // \u68c0\u67e5\u540c\u7ea7\u91cd\u540d\n            const siblings = tree.children(tree.currentId);\n            if (siblings.find(f => f.name === name)) return showToast('\u540c\u7ea7\u5df2\u6709\u540c\u540d\u6587\u4ef6\u5939\uff01', 'error');\n            tree.mkFolder(name, tree.currentId);\n            closeModal('mkdir-modal');\n            showToast('\u5df2\u521b\u5efa\u6587\u4ef6\u5939\uff1a' + name);\n            onDone();\n        }\n\n        function openMoveTreeModal(context) {\n            _moveContext = context;\n            _moveSelected = context.tree.currentId === 'root' ? 'root' : context.tree.currentId;\n            renderMoveTree();\n            openModal('move-modal');\n        }\n        function renderMoveTree() {\n            if (!_moveContext) return;\n            const list = document.getElementById('move-tree-list');\n            list.innerHTML = '';\n            // \u83b7\u53d6\u9009\u4e2d\u9879\u7684 id\uff08\u8981\u8df3\u8fc7\u5b83\u4eec\u53ca\u5176\u540e\u4ee3\uff09\n            const selectedItems = _moveContext.getSelectedItems();\n            const skipFolderIds = selectedItems\n                .filter(item => item._isFolder)\n                .flatMap(item => _moveContext.tree.descendants(item.id));\n            const flat = _moveContext.tree.flatTree(skipFolderIds);\n            flat.forEach(f => {\n                const li = document.createElement('li');\n                const btn = document.createElement('button');\n                btn.className = 'folder-tree-item' + (f.id === _moveSelected ? ' selected' : '');\n                const indent = document.createElement('span');\n                indent.className = 'indent';\n                indent.style.paddingLeft = (f.depth * 14) + 'px';\n                btn.appendChild(indent);\n                btn.appendChild(document.createTextNode((f.id === 'root' ? '\ud83c\udfe0 ' : '\ud83d\udcc1 ') + f.name));\n                btn.onclick = () => {\n                    _moveSelected = f.id;\n                    list.querySelectorAll('.folder-tree-item').forEach(b => b.classList.remove('selected'));\n                    btn.classList.add('selected');\n                };\n                li.appendChild(btn);\n                list.appendChild(li);\n            });\n        }\n        function confirmMove() {\n            if (!_moveContext) return closeModal('move-modal');\n            const targetId = _moveSelected;\n            _moveContext.doMove(targetId);\n            closeModal('move-modal');\n        }\n\n        // ============================================================\n        // \u2605 \u901a\u7528\uff1a\u6e32\u67d3\u9762\u5305\u5c51\n        // ============================================================\n        let _jumpContext = null;\n        function openJumpModal(tree, onNavigate) {\n            _jumpContext = { tree, onNavigate };\n            const list = document.getElementById('jump-tree-list');\n            list.innerHTML = '';\n            const flat = tree.flatTree([]);\n            flat.forEach(f => {\n                const li = document.createElement('li');\n                const btn = document.createElement('button');\n                btn.className = 'folder-tree-item' + (f.id === tree.currentId ? ' selected' : '');\n                const indent = document.createElement('span');\n                indent.className = 'indent';\n                indent.style.paddingLeft = (f.depth * 14) + 'px';\n                btn.appendChild(indent);\n                btn.appendChild(document.createTextNode((f.id === 'root' ? '\ud83c\udfe0 ' : '\ud83d\udcc1 ') + f.name));\n                btn.onclick = () => {\n                    tree.currentId = f.id;\n                    closeModal('jump-modal');\n                    onNavigate();\n                };\n                li.appendChild(btn);\n                list.appendChild(li);\n            });\n            openModal('jump-modal');\n        }\n\n        function renderBreadcrumb(tree, containerId, onNavigate) {\n            const el = document.getElementById(containerId);\n            el.innerHTML = '';\n            el.style.cursor = 'pointer';\n            const path = tree.path(tree.currentId);\n\n            // \u6574\u6761\u680f\u70b9\u51fb\u7a7a\u767d = \u5f39\u8df3\u8f6c\uff08\u6392\u9664\u6309\u94ae\u672c\u8eab\u5192\u6ce1\uff09\n            el.onclick = (e) => {\n                if (e.target === el) openJumpModal(tree, onNavigate);\n            };\n\n            // \u6839\u8282\u70b9\u2014\u2014\u70b9\u51fb\u5f39\u8df3\u8f6c\n            const rootBtn = document.createElement('button');\n            rootBtn.className = 'breadcrumb-item' + (tree.currentId === 'root' ? ' active' : '');\n            rootBtn.innerHTML = '\ud83c\udfe0 \u5168\u90e8';\n            rootBtn.onclick = (e) => { e.stopPropagation(); openJumpModal(tree, onNavigate); };\n            el.appendChild(rootBtn);\n\n            path.forEach((f, i) => {\n                const sep = document.createElement('span');\n                sep.className = 'breadcrumb-sep';\n                sep.innerHTML = ' \u203a ';\n                el.appendChild(sep);\n\n                const btn = document.createElement('button');\n                const isLast = (i === path.length - 1);\n                btn.className = 'breadcrumb-item' + (isLast ? ' active' : '');\n                btn.textContent = f.name;\n                if (!isLast) {\n                    btn.onclick = (e) => { e.stopPropagation(); tree.currentId = f.id; onNavigate(); };\n                } else {\n                    btn.onclick = (e) => { e.stopPropagation(); openJumpModal(tree, onNavigate); };\n                }\n                el.appendChild(btn);\n            });\n\n            // \u975e\u6839\u76ee\u5f55\u65f6\u663e\u793a\u5220\u9664\u6587\u4ef6\u5939\u6309\u94ae\n            if (tree.currentId !== 'root') {\n                const sep = document.createElement('span');\n                sep.className = 'breadcrumb-sep';\n                sep.innerHTML = '&nbsp;&nbsp;';\n                el.appendChild(sep);\n                const delBtn = document.createElement('button');\n                delBtn.className = 'breadcrumb-item';\n                delBtn.style.cssText = 'color:var(--accent-red);font-size:12px;';\n                delBtn.innerHTML = '\ud83d\uddd1 \u5220\u9664\u6b64\u6587\u4ef6\u5939';\n                delBtn.onclick = (e) => { e.stopPropagation(); onNavigate('delete'); };\n                el.appendChild(delBtn);\n            }\n\n            // \u53f3\u4fa7\u7a7a\u767d\u533a\u8865\u5145\u4e00\u4e2a\u900f\u660e\u53ef\u70b9\u533a\u57df\u6491\u6ee1\u5269\u4f59\u7a7a\u95f4\n            const filler = document.createElement('span');\n            filler.style.cssText = 'flex:1;min-width:20px;display:inline-block;';\n            filler.onclick = () => openJumpModal(tree, onNavigate);\n            el.appendChild(filler);\n        }\n\n        // ============================================================\n        // \u2605 \u901a\u7528\u5927\u5c0f\u5f39\u7a97\uff08\u89d2\u8272\u5361 / \u7f8e\u5316 / \u4e16\u754c\u4e66\u5171\u7528\uff09\n        // ============================================================\n        let _genericColsContext = null; // { containerId, state }\n        let cardsCols = 3, themesCols = 2, loreCols = 3;\n\n        function openGenericSizeModal(containerId, currentCols, onSet) {\n            _genericColsContext = { containerId, currentCols, onSet };\n            [2,3,4].forEach(n => {\n                const btn = document.getElementById('gcol-' + n);\n                if (btn) btn.className = 'btn ' + (n === currentCols ? '' : 'btn-secondary');\n            });\n            openModal('generic-size-modal');\n        }\n        function genericSetCols(n) {\n            if (!_genericColsContext) return;\n            const { containerId, onSet } = _genericColsContext;\n            const el = document.getElementById(containerId);\n            if (el) el.style.gridTemplateColumns = 'repeat(' + n + ',1fr)';\n            onSet(n);\n            [2,3,4].forEach(i => {\n                const btn = document.getElementById('gcol-' + i);\n                if (btn) btn.className = 'btn ' + (i === n ? '' : 'btn-secondary');\n            });\n            closeModal('generic-size-modal');\n        }\n        function cardsOpenSizeModal() {\n            openGenericSizeModal('card-container', cardsCols, n => {\n                cardsCols = n;\n                // \u8986\u76d6 CSS class \u7684\u9ed8\u8ba4\u5217\u6570\n                document.getElementById('card-container').style.gridTemplateColumns = 'repeat(' + n + ',1fr)';\n            });\n        }\n        function themesOpenSizeModal() {\n            openGenericSizeModal('theme-card-container', themesCols, n => { themesCols = n; });\n        }\n        function loreOpenSizeModal() {\n            openGenericSizeModal('lore-container', loreCols, n => {\n                loreCols = n;\n                document.getElementById('lore-container').style.gridTemplateColumns = 'repeat(' + n + ',1fr)';\n            });\n        }\n\n        function initApp() { renderCards(); }\n        function switchView(viewName) { const container = document.getElementById('card-container'); container.className = ''; container.classList.add(viewName); }\n\n        function toggleTheme() { \n            appState.isDarkMode = !appState.isDarkMode; \n            document.body.classList.toggle('dark-mode', appState.isDarkMode); \n            const sunSvg = `<svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"5\"><\/circle><line x1=\"12\" y1=\"1\" x2=\"12\" y2=\"3\"><\/line><line x1=\"12\" y1=\"21\" x2=\"12\" y2=\"23\"><\/line><line x1=\"4.22\" y1=\"4.22\" x2=\"5.64\" y2=\"5.64\"><\/line><line x1=\"18.36\" y1=\"18.36\" x2=\"19.78\" y2=\"19.78\"><\/line><line x1=\"1\" y1=\"12\" x2=\"3\" y2=\"12\"><\/line><line x1=\"21\" y1=\"12\" x2=\"23\" y2=\"12\"><\/line><line x1=\"4.22\" y1=\"19.78\" x2=\"5.64\" y2=\"18.36\"><\/line><line x1=\"18.36\" y1=\"5.64\" x2=\"19.78\" y2=\"4.22\"><\/line><\/svg>`;\n            const moonSvg = `<svg viewBox=\"0 0 24 24\"><path d=\"M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z\"><\/path><\/svg>`;\n            ['theme-btn','theme-btn-html','theme-btn-themes','theme-btn-lore'].forEach(id => {\n                const b = document.getElementById(id);\n                if (b) b.innerHTML = appState.isDarkMode ? sunSvg : moonSvg;\n            });\n        }\n\n        function openModal(modalId) { document.getElementById(modalId).style.display = 'flex'; }\n        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }\n        window.onclick = function(event) { if (event.target.classList.contains('modal')) event.target.style.display = 'none'; }\n        \n        function showToast(msg, type = 'info') {\n            const toast = document.createElement('div');\n            toast.className = `toast ${type === 'error' ? 'error' : ''}`;\n            toast.innerText = msg;\n            document.body.appendChild(toast);\n            void toast.offsetWidth;\n            toast.classList.add('show');\n            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);\n        }\n\n        // ============================================================\n        // \u2605\u2605\u2605 \u89d2\u8272\u5361 \u903b\u8f91 \u2605\u2605\u2605\n        // ============================================================\n        function cardsMkdir() {\n            openMkdirModal(appState.tree, () => renderCards());\n        }\n        function toggleSelectAll() {\n            const cbs = document.querySelectorAll('#card-container .card-checkbox');\n            const all = Array.from(cbs).every(c => c.checked);\n            cbs.forEach(c => c.checked = !all);\n        }\n        function openMoveModal() {\n            const checked = document.querySelectorAll('#card-container .card-checkbox:checked');\n            if (!checked.length) return showToast('\u8bf7\u5148\u52fe\u9009\u5361\u7247\uff01', 'error');\n            openMoveTreeModal({\n                tree: appState.tree,\n                getSelectedItems: () => Array.from(checked).map(cb => appState.cards.find(c => c.id === cb.dataset.id)).filter(Boolean),\n                doMove: (targetId) => {\n                    checked.forEach(cb => {\n                        const c = appState.cards.find(x => x.id === cb.dataset.id);\n                        if (c) c.folderId = targetId;\n                    });\n                    renderCards();\n                    showToast('\u5df2\u79fb\u52a8 ' + checked.length + ' \u5f20\u5361\u7247');\n                }\n            });\n        }\n        function deleteSelectedCards() {\n            const checked = document.querySelectorAll('#card-container .card-checkbox:checked');\n            if (!checked.length) return showToast('\u8bf7\u5148\u52fe\u9009\u5361\u7247\uff01', 'error');\n            if (confirm('\u786e\u5b9a\u5220\u9664\u9009\u4e2d\u7684 ' + checked.length + ' \u5f20\u5361\u7247\uff1f')) {\n                const ids = Array.from(checked).map(cb => cb.dataset.id);\n                appState.cards = appState.cards.filter(c => !ids.includes(c.id));\n                renderCards();\n                showToast('\u5df2\u5220\u9664 ' + ids.length + ' \u5f20', 'error');\n            }\n        }\n        function copyModalDesc() {\n            const text = document.getElementById('modal-body').innerText;\n            navigator.clipboard.writeText(text).then(() => showToast('\u4eba\u8bbe\u5df2\u590d\u5236\u5230\u526a\u8d34\u677f \u2713')).catch(() => {\n                const ta = document.createElement('textarea');\n                ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';\n                document.body.appendChild(ta); ta.select(); document.execCommand('copy');\n                ta.remove(); showToast('\u4eba\u8bbe\u5df2\u590d\u5236\u5230\u526a\u8d34\u677f \u2713');\n            });\n        }\n\n        function renderCards() {\n            // \u9762\u5305\u5c51\n            renderBreadcrumb(appState.tree, 'cards-breadcrumb', (action) => {\n                if (action === 'delete') deleteCurrentFolderCards();\n                else renderCards();\n            });\n            const container = document.getElementById('card-container');\n            container.innerHTML = '';\n            const curId = appState.tree.currentId;\n\n            // \u5b50\u6587\u4ef6\u5939\n            const subFolders = appState.tree.children(curId);\n            subFolders.forEach(folder => {\n                const card = document.createElement('div');\n                card.className = 'folder-card';\n\n                // \u5220\u9664\u6309\u94ae\n                const delBtn = document.createElement('button');\n                delBtn.className = 'folder-card-del';\n                delBtn.innerHTML = '\u2715';\n                delBtn.onclick = (e) => { e.stopPropagation(); deleteFolderNode(folder.id, appState.tree, renderCards); };\n\n                const icon = document.createElement('div');\n                icon.className = 'folder-icon';\n                icon.innerHTML = '\ud83d\udcc1';\n\n                const name = document.createElement('div');\n                name.className = 'card-name';\n                name.textContent = folder.name;\n\n                card.appendChild(delBtn);\n                card.appendChild(icon);\n                card.appendChild(name);\n                card.onclick = () => { appState.tree.currentId = folder.id; renderCards(); };\n                container.appendChild(card);\n            });\n\n            // \u5f53\u524d\u6587\u4ef6\u5939\u7684\u5361\u7247\n            const visibleCards = appState.cards.filter(c => c.folderId === curId);\n            if (subFolders.length === 0 && visibleCards.length === 0) {\n                container.innerHTML = '<p style=\"text-align:center;width:100%;color:var(--text-muted);padding:40px 20px;\">\u5f53\u524d\u6587\u4ef6\u5939\u4e3a\u7a7a\uff0c\u70b9\u51fb\u300c\u5bfc\u5165\u5361\u7247\u300d\u6216\u300c\u65b0\u5efa\u6587\u4ef6\u5939\u300d\u5f00\u59cb<\/p>';\n                return;\n            }\n            visibleCards.forEach(card => {\n                const cardEl = document.createElement('div');\n                cardEl.className = 'card';\n                cardEl.onclick = () => {\n                    document.getElementById('modal-title').innerText = card.name;\n                    document.getElementById('modal-body').innerText = card.description;\n                    openModal('character-modal');\n                };\n                const avatarHtml = card.imageUrl\n                    ? `<img src=\"${card.imageUrl}\" class=\"image-avatar\" alt=\"Avatar\">`\n                    : `<div class=\"text-avatar\" style=\"color:${card.color}\">${card.initial}<\/div>`;\n                cardEl.innerHTML = `\n                    <input type=\"checkbox\" class=\"card-checkbox\" data-id=\"${card.id}\" onclick=\"event.stopPropagation()\">\n                    ${avatarHtml}\n                    <div class=\"card-info\"><h4 class=\"card-name\">${card.name}<\/h4><\/div>`;\n                container.appendChild(cardEl);\n            });\n        }\n\n        function deleteFolderNode(folderId, tree, rerender) {\n            const f = tree.getFolderById(folderId);\n            if (!f) return;\n            if (!confirm('\u5220\u9664\u6587\u4ef6\u5939\u300c' + f.name + '\u300d\uff1f\\n\u5176\u4e2d\u6240\u6709\u5185\u5bb9\u4f1a\u79fb\u81f3\u7236\u6587\u4ef6\u5939\u3002')) return;\n            const parentId = f.parentId || 'root';\n            // \u628a\u5b50\u6587\u4ef6\u5939\u7684\u7236\u6539\u4e3a\u88ab\u5220\u6587\u4ef6\u5939\u7684\u7236\n            tree.folders.forEach(x => { if (x.parentId === folderId) x.parentId = parentId; });\n            // \u628a\u5361\u7247\u7684 folderId \u6539\u4e3a\u7236\n            if (appState.cards) appState.cards.forEach(c => { if (c.folderId === folderId) c.folderId = parentId; });\n            if (htmlState.tools) htmlState.tools.forEach(t => { if (t.folderId === folderId) t.folderId = parentId; });\n            tree.folders = tree.folders.filter(x => x.id !== folderId);\n            if (tree.currentId === folderId) tree.currentId = parentId;\n            rerender();\n            showToast('\u6587\u4ef6\u5939\u5df2\u5220\u9664\uff0c\u5185\u5bb9\u5df2\u4e0a\u79fb', 'error');\n        }\n\n        function deleteCurrentFolderCards() {\n            deleteFolderNode(appState.tree.currentId, appState.tree, renderCards);\n        }\n\n        // ==========================================\n        // \u2605\u2605\u2605 \u6838\u5fc3\u5e95\u5c42\uff1aPNG \u89e3\u6790\u529f\u80fd\uff08\u9632\u5f39\u7248\uff09\u2605\u2605\u2605\n        // ==========================================\n        function parsePngChunk(arrayBuffer) {\n            try {\n                const dataView = new DataView(arrayBuffer);\n                const uint8Array = new Uint8Array(arrayBuffer);\n\n                // \u6821\u9a8c PNG \u5934\n                if (uint8Array[0] !== 0x89 || uint8Array[1] !== 0x50 || uint8Array[2] !== 0x4E || uint8Array[3] !== 0x47) return null;\n\n                let offset = 8;\n                while (offset < uint8Array.length) {\n                    if (offset + 8 > uint8Array.length) break;\n                    const length = dataView.getUint32(offset); offset += 4;\n                    const type = String.fromCharCode(uint8Array[offset], uint8Array[offset+1], uint8Array[offset+2], uint8Array[offset+3]); offset += 4;\n\n                    if (type === 'tEXt' || type === 'iTXt') {\n                        const chunkData = new Uint8Array(arrayBuffer, offset, length);\n                        const nullIndex = chunkData.indexOf(0);\n                        \n                        if (nullIndex !== -1) {\n                            const keyword = new TextDecoder().decode(chunkData.slice(0, nullIndex));\n                            if (keyword === 'chara' || keyword === 'ccv3' || keyword === 'TavernAI') {\n                                let textData;\n                                if (type === 'iTXt') {\n                                    let nullCount = 0; let textStart = nullIndex + 1;\n                                    for (let i = textStart; i < chunkData.length; i++) {\n                                        if (chunkData[i] === 0) { nullCount++; if (nullCount === 3) { textStart = i + 1; break; } }\n                                    }\n                                    textData = chunkData.slice(textStart);\n                                } else { textData = chunkData.slice(nullIndex + 1); }\n\n                                const encodedText = new TextDecoder('utf-8').decode(textData);\n\n                                // \u591a\u7ea7\u964d\u7ea7\u89e3\u6790\u4fdd\u62a4\n                                try { return JSON.parse(encodedText); } catch(e1) {}\n                                try {\n                                    const cleanStr = encodedText.replace(/[^A-Za-z0-9+/=]/g, '');\n                                    const binString = window.atob(cleanStr);\n                                    try {\n                                        const bytes = new Uint8Array(binString.length);\n                                        for (let i = 0; i < binString.length; i++) bytes[i] = binString.charCodeAt(i);\n                                        return JSON.parse(new TextDecoder('utf-8').decode(bytes));\n                                    } catch (e2) { return JSON.parse(decodeURIComponent(escape(binString))); }\n                                } catch(e3) { return null; }\n                            }\n                        }\n                    }\n                    offset += length + 4;\n                }\n            } catch (error) { console.error(\"\u89e3\u6790\u56fe\u7247\u65f6\u53d1\u751f\u9519\u8bef:\", error); }\n            return null;\n        }\n\n        // ==========================================\n        // \u2605 \u5bfc\u5165\u6838\u5fc3\u903b\u8f91\uff1a\u81ea\u52a8\u533a\u5206 JSON \u548c PNG \u2605\n        // ==========================================\n        document.getElementById('file-upload').addEventListener('change', async function(event) {\n            const files = event.target.files;\n            if (files.length === 0) return;\n            openModal('loading-modal');\n\n            const promises = Array.from(files).map(file => {\n                return new Promise(resolve => {\n                    if (file.name.toLowerCase().endsWith('.json')) {\n                        const reader = new FileReader();\n                        reader.onload = function(e) {\n                            try {\n                                const jsonData = JSON.parse(e.target.result);\n                                addCardData(jsonData, null);\n                                showToast('\u5df2\u5bfc\u5165: ' + file.name.replace(/\\.json$/i,''));\n                            } catch (err) { showToast('JSON\u89e3\u6790\u5931\u8d25: ' + file.name, 'error'); }\n                            resolve();\n                        };\n                        reader.onerror = () => resolve();\n                        reader.readAsText(file);\n                    } \n                    else if (file.name.toLowerCase().endsWith('.png')) {\n                        const reader = new FileReader();\n                        reader.readAsArrayBuffer(file);\n                        reader.onload = function(e) {\n                            const jsonData = parsePngChunk(e.target.result);\n                            if (jsonData) {\n                                const imageUrl = URL.createObjectURL(file);\n                                addCardData(jsonData, imageUrl);\n                                showToast('\u5df2\u5bfc\u5165: ' + file.name.replace(/\\.png$/i,''));\n                            } else {\n                                showToast('\u6b64PNG\u4e0d\u542b\u89d2\u8272\u6570\u636e: ' + file.name, 'error');\n                            }\n                            resolve();\n                        };\n                        reader.onerror = () => resolve();\n                    }\n                    else if (file.name.toLowerCase().endsWith('.txt')) {\n                        const reader = new FileReader();\n                        reader.onload = function(e) {\n                            const text = e.target.result.trim();\n                            const name = file.name.replace(/\\.txt$/i, '');\n                            addCardData({ name: name, description: text }, null);\n                            showToast('\u5df2\u5bfc\u5165: ' + name);\n                            resolve();\n                        };\n                        reader.onerror = () => resolve();\n                        reader.readAsText(file, 'UTF-8');\n                    }\n                    else if (file.name.toLowerCase().endsWith('.docx')) {\n                        const reader = new FileReader();\n                        reader.onload = function(e) {\n                            mammoth.extractRawText({ arrayBuffer: e.target.result })\n                                .then(result => {\n                                    const text = result.value.trim();\n                                    const name = file.name.replace(/\\.docx$/i, '');\n                                    addCardData({ name: name, description: text }, null);\n                                    showToast('\u5df2\u5bfc\u5165: ' + name);\n                                    resolve();\n                                })\n                                .catch(() => { showToast('DOCX\u89e3\u6790\u5931\u8d25: ' + file.name, 'error'); resolve(); });\n                        };\n                        reader.onerror = () => resolve();\n                        reader.readAsArrayBuffer(file);\n                    }\n                    else {\n                        resolve();\n                    }\n                });\n            });\n\n            await Promise.all(promises);\n            event.target.value = '';\n            renderCards();\n            closeModal('loading-modal');\n            showToast(`\u5bfc\u5165\u5b8c\u6210\uff0c\u5f53\u524d\u5171 ${appState.cards.length} \u5f20\u5361\u7247`);\n        });\n\n        // \u5c06\u63d0\u53d6\u5230\u7684\u6570\u636e\u5b58\u5165\u72b6\u6001\u7ba1\u7406\u5668\n        function addCardData(jsonData, imageUrl) {\n            const charName = jsonData.name || (jsonData.data && jsonData.data.name) || \"\u672a\u77e5\u89d2\u8272\";\n            const charDesc = jsonData.description || (jsonData.data && jsonData.data.description) || \"\u6682\u65e0\u63cf\u8ff0\u3002\";\n            appState.cards.push({\n                id: 'card_' + Date.now() + '_' + Math.floor(Math.random() * 1000),\n                name: charName,\n                initial: charName.charAt(0).toUpperCase(),\n                description: charDesc,\n                color: colors[Math.floor(Math.random() * colors.length)],\n                folderId: appState.tree.currentId,\n                imageUrl: imageUrl\n            });\n        }\n\n        // ==========================================\n        // \u2605\u2605\u2605 PWA\uff1a\u52a8\u6001\u751f\u6210 Manifest + ServiceWorker \u2605\u2605\u2605\n        // ==========================================\n        let deferredInstallPrompt = null;\n\n        window.addEventListener('beforeinstallprompt', (e) => {\n            e.preventDefault();\n            deferredInstallPrompt = e;\n            // \u663e\u793a\u4e00\u952e\u5b89\u88c5\u6309\u94ae\n            document.getElementById('install-btn').style.display = 'inline-flex';\n            document.getElementById('install-prompt-btn').style.display = 'inline-flex';\n        });\n\n        window.addEventListener('appinstalled', () => {\n            deferredInstallPrompt = null;\n            document.getElementById('install-btn').style.display = 'none';\n            showToast('\u2705 \u5df2\u6210\u529f\u5b89\u88c5\u5230\u684c\u9762\uff01');\n        });\n\n        function triggerInstall() {\n            if (deferredInstallPrompt) {\n                deferredInstallPrompt.prompt();\n                deferredInstallPrompt.userChoice.then(() => { deferredInstallPrompt = null; });\n                closeModal('install-modal');\n            } else {\n                openModal('install-modal');\n            }\n        }\n\n        async function setupPWA() {\n            // 1. \u7528 canvas \u751f\u6210\u56fe\u6807 blob\n            function makeIcon(size) {\n                return new Promise(resolve => {\n                    const c = document.createElement('canvas');\n                    c.width = c.height = size;\n                    const ctx = c.getContext('2d');\n                    const r = size * 0.22;\n                    ctx.fillStyle = '#6a93b0';\n                    ctx.beginPath();\n                    ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);\n                    ctx.quadraticCurveTo(size, 0, size, r);\n                    ctx.lineTo(size, size - r);\n                    ctx.quadraticCurveTo(size, size, size - r, size);\n                    ctx.lineTo(r, size);\n                    ctx.quadraticCurveTo(0, size, 0, size - r);\n                    ctx.lineTo(0, r);\n                    ctx.quadraticCurveTo(0, 0, r, 0);\n                    ctx.closePath(); ctx.fill();\n                    ctx.fillStyle = 'white';\n                    ctx.font = `bold ${Math.floor(size * 0.44)}px serif`;\n                    ctx.textAlign = 'center';\n                    ctx.textBaseline = 'middle';\n                    ctx.fillText('\u5361', size / 2, size / 2 + size * 0.03);\n                    c.toBlob(resolve, 'image/png');\n                });\n            }\n\n            try {\n                const [blob192, blob512] = await Promise.all([makeIcon(192), makeIcon(512)]);\n                const url192 = URL.createObjectURL(blob192);\n                const url512 = URL.createObjectURL(blob512);\n\n                // 2. \u521b\u5efa manifest blob\n                const manifest = {\n                    name: 'SillyTavern \u5361\u7247\u6574\u7406\u5de5\u5177',\n                    short_name: '\u89d2\u8272\u5361\u7247',\n                    description: '\u672c\u5730\u89d2\u8272\u5361\u7247\u6574\u7406\u4e0e\u7ba1\u7406\u5de5\u5177',\n                    start_url: window.location.href,\n                    scope: window.location.href,\n                    display: 'standalone',\n a\u65b9 appState \u533a\u5757\u5b9a\u4e49\n\n        // \u5224\u65ad\u662f\u5426\u662f DOCX\uff08ZIP magic bytes: PK\\x03\\x04\uff09\n        async function isDocxFile(file) {\n            if (/\\.(docx|doc)$/i.test(file.name)) return true;\n            // \u65e0\u6269\u5c55\u540d\u65f6\u8bfb magic bytes\n            try {\n                const buf = await file.slice(0, 4).arrayBuffer();\n                const bytes = new Uint8Array(buf);\n                // PK zip header = 50 4B 03 04\n                return bytes[0] === 0x50 && bytes[1] === 0x4B && bytes[2] === 0x03 && bytes[3] === 0x04;\n            } catch { return false; }\n        }\n\n        function extractHtmlFromText(raw) {\n            // docx \u7ecf mammoth \u63d0\u53d6\u540e\uff0c< > \u53ef\u80fd\u88ab\u8f6c\u4e49\u4e3a \\< \\>\uff0c\u5148\u8fd8\u539f\n            let text = raw.replace(/\\\\<\/g, '<').replace(/\\\\>/g, '>');\n            // \u540c\u65f6\u5904\u7406\u53ef\u80fd\u7684 HTML \u5b9e\u4f53\n            text = text.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');\n\n            // \u4f18\u5148\u627e\u5b8c\u6574\u6587\u6863\u8d77\u70b9\n            const patterns = [\n                /<!DOCTYPE\\s+html/i,\n                /<html[\\s>]/i,\n                // \u6709\u4e9b\u4e16\u754c\u4e66\u53ea\u6709 <div ... style= \u8fd9\u79cd\u7247\u6bb5\u5165\u53e3\uff0c\u4e5f\u5c1d\u8bd5\u5339\u914d\n                /<div\\s[^>]*style\\s*=/i,\n                /<style[\\s>]/i,\n            ];\n            let startIdx = -1;\n            for (const pat of patterns) {\n                const m = text.search(pat);\n                if (m !== -1 && (startIdx === -1 || m < startIdx)) startIdx = m;\n            }\n            if (startIdx === -1) return null; // \u5b8c\u5168\u627e\u4e0d\u5230 HTML\uff0c\u8fd4\u56de null\n            return text.slice(startIdx);\n        }\n\n        // --- \u5bfc\u5165 ---\n        document.getElementById('html-file-upload').addEventListener('change', async function(e) {\n            const files = e.target.files;\n            if (!files.length) return;\n            for (const file of files) {\n                const name = file.name.replace(/\\.(docx|doc|dox|txt|json)$/i, '') || file.name;\n                const ext = file.name.split('.').pop().toLowerCase();\n                try {\n                    let htmlContent = null;\n\n                    if (ext === 'json') {\n                        // JSON\uff1a\u5c1d\u8bd5\u63d0\u53d6 replacePattern\uff08ST\u72b6\u6001\u680f\u9884\u8bbe\u683c\u5f0f\uff09\u6216\u5176\u4ed6\u542bHTML\u7684\u5b57\u6bb5\n                        const text = await file.text();\n                        try {\n                            const jsonData = JSON.parse(text);\n                            // \u4f18\u5148\u627e\u542bHTML\u7684\u5b57\u6bb5\n                            const htmlFields = ['replacePattern', 'content', 'html', 'template', 'value'];\n                            for (const field of htmlFields) {\n                                if (jsonData[field] && typeof jsonData[field] === 'string') {\n                                    const extracted = extractHtmlFromText(jsonData[field]);\n                                    if (extracted) { htmlContent = extracted; break; }\n                                }\n                            }\n                            // items \u6570\u7ec4\u91cc\u627e\n                            if (!htmlContent && jsonData.items && Array.isArray(jsonData.items)) {\n                                for (const item of jsonData.items) {\n                                    for (const field of htmlFields) {\n                                        if (item[field]) {\n                                            const extracted = extractHtmlFromText(String(item[field]));\n                                            if (extracted) { htmlContent = extracted; break; }\n                                        }\n                                    }\n                                    if (htmlContent) break;\n                                }\n                            }\n                            // \u627e\u4e0d\u5230HTML\u5c31\u628a\u6574\u4e2ajson\u683c\u5f0f\u5316\u5c55\u793a\n                            if (!htmlContent) {\n                                htmlContent = '<pre style=\"white-space:pre-wrap;word-break:break-all;font-size:13px;line-height:1.6;\">' +\n                                    JSON.stringify(jsonData, null, 2).replace(/<\/g,'&lt;').replace(/>/g,'&gt;') + '<\/pre>';\n                            }\n                        } catch {\n                            // \u975e\u6cd5json\u5f53\u7eaf\u6587\u672c\n                            htmlContent = '<pre style=\"white-space:pre-wrap;font-size:13px;\">' + text.replace(/<\/g,'&lt;').replace(/>/g,'&gt;') + '<\/pre>';\n                        }\n\n                    } else if (ext === 'dox' || ext === 'docx' || ext === 'doc') {\n                        const arrayBuffer = await file.arrayBuffer();\n                        const result = await mammoth.extractRawText({ arrayBuffer });\n                        htmlContent = extractHtmlFromText(result.value);\n\n                    } else {\n                        // txt \u53ca\u5176\u4ed6\u6587\u672c\u683c\u5f0f\n                        const text = await file.text();\n                        htmlContent = extractHtmlFromText(text);\n                    }\n\n                    if (!htmlContent) { showToast('\u672a\u627e\u5230 HTML \u5185\u5bb9: ' + name, 'error'); continue; }\n                    const id = 'ht_' + Date.now() + '_' + Math.random().toString(36).slice(2);\n                    htmlState.tools.push({ id, name, htmlContent, folderId: htmlState.tree.currentId });\n                    showToast('\u5df2\u5bfc\u5165: ' + name);\n                } catch(err) {\n                    showToast('\u5bfc\u5165\u5931\u8d25: ' + file.name, 'error');\n                    console.error(err);\n                }\n            }\n            e.target.value = '';\n            renderHtmlCards();\n        });\n\n        // --- HTML \u6587\u4ef6\u5939 ---\n        function htmlMkdir() {\n            openMkdirModal(htmlState.tree, () => renderHtmlCards());\n        }\n        function htmlToggleSelectAll() {\n            const cbs = document.querySelectorAll('#html-card-container .html-cb');\n            const all = Array.from(cbs).every(c => c.checked);\n            cbs.forEach(c => c.checked = !all);\n        }\n        function htmlOpenMoveModal() {\n            const checked = document.querySelectorAll('#html-card-container .html-cb:checked');\n            if (!checked.length) return showToast('\u8bf7\u5148\u52fe\u9009\u5361\u7247\uff01', 'error');\n            openMoveTreeModal({\n                tree: htmlState.tree,\n                getSelectedItems: () => Array.from(checked).map(cb => htmlState.tools.find(t => t.id === cb.dataset.id)).filter(Boolean),\n                doMove: (targetId) => {\n                    checked.forEach(cb => {\n                        const t = htmlState.tools.find(x => x.id === cb.dataset.id);\n                        if (t) t.folderId = targetId;\n                    });\n                    renderHtmlCards();\n                    showToast('\u5df2\u79fb\u52a8 ' + checked.length + ' \u5f20\u5361\u7247');\n                }\n            });\n        }\n        function htmlDeleteSelected() {\n            const checked = document.querySelectorAll('#html-card-container .html-cb:checked');\n            if (!checked.length) return showToast('\u8bf7\u5148\u52fe\u9009\u5361\u7247\uff01', 'error');\n            if (confirm('\u786e\u5b9a\u5220\u9664\u9009\u4e2d\u7684 ' + checked.length + ' \u5f20\u5361\u7247\uff1f')) {\n                const ids = Array.from(checked).map(cb => cb.dataset.id);\n                htmlState.tools = htmlState.tools.filter(t => !ids.includes(t.id));\n                renderHtmlCards();\n                showToast('\u5df2\u eateElement('button');\n                delBtn.className = 'folder-card-del';\n                delBtn.innerHTML = '\u2715';\n                delBtn.onclick = (e) => { e.stopPropagation(); deleteFolderNode(folder.id, htmlState.tree, renderHtmlCards); };\n\n                const icon = document.createElement('div');\n                icon.className = 'folder-icon';\n                icon.innerHTML = '\ud83d\udcc1';\n\n                const name = document.createElement('div');\n                name.className = 'card-name';\n                name.textContent = folder.name;\n\n                card.appendChild(delBtn);\n                card.appendChild(icon);\n                card.appendChild(name);\n                card.onclick = () => { htmlState.tree.currentId = folder.id; renderHtmlCards(); };\n                container.appendChild(card);\n            });\n\n            // \u5f53\u524d\u6587\u4ef6\u5939\u7684 tool \u5361\n            const visible = htmlState.tools.filter(t => t.folderId === curId);\n            if (subFolders.length === 0 && visible.length === 0) {\n                container.style.gridTemplateColumns = '';\n                container.innerHTML = '<p style=\"text-align:center;width:100%;color:var(--text-muted);padding:40px 20px;\">\u5f53\u524d\u6587\u4ef6\u5939\u4e3a\u7a7a\uff0c\u70b9\u51fb\u300c\u5bfc\u5165\u300d\u6216\u300c\u65b0\u5efa\u6587\u4ef6\u5939\u300d\u5f00\u59cb<\/p>';\n                return;\n            }\n\n            visible.forEach(tool => {\n                const card = document.createElement('div');\n                card.className = 'card';\n                card.style.cssText = 'padding:10px;text-align:center;display:flex;flex-direction:column;align-items:center;overflow:hidden;position:relative;cursor:pointer;user-select:none;-webkit-user-select:none;';\n\n                const cb = document.createElement('input');\n                cb.type = 'checkbox'; cb.className = 'card-checkbox html-cb'; cb.dataset.id = tool.id;\n             }\n            e.target.value = '';\n            renderThemeCards();\n        });\n\n        // \u6c14\u6ce1\u9884\u89c8 HTML \u6a21\u677f\uff08\u517c\u5bb9\u5404\u79cd\u547d\u540d\u7ea6\u5b9a\uff09\n        function buildPreviewHtml(cssContent) {\n            return `<!DOCTYPE html><html lang=\"zh-CN\"><head><meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n*{box-sizing:border-box;margin:0;padding:0;}\nbody{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif;background:#f0f2f5;padding:16px 12px;min-height:100vh;}\n.chat-wrap{display:flex;flex-direction:column;gap:4px;max-width:440px;margin:0 auto;}\n\n/* --- \u7eaf\u5e03\u5c40\uff0c\u4e0d\u8bbe\u4efb\u4f55\u989c\u8272\uff0c\u5b8c\u5168\u4ea4\u7ed9\u7528\u6237CSS --- */\n.message-wrapper{display:flex;align-items:flex-end;gap:8px;position:relative;margin-bottom:4px;}\n.message-wrapper.ai,.message-wrapper.received,.message-wrapper.char{flex-direction:row;}\n.message-wrapper.user,.message-wrapper.sent,.message-wrapper.me{flex-direction:row-reverse;}\n\n.avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;}\n.message-wrapper.ai .avatar,.message-wrapper.received .avatar,.message-wrapper.char .avatar{background:#b8d4f0;}\n.message-wrapper.user .avatar,.message-wrapper.sent .avatar,.message-wrapper.me .avatar{background:#f0c8d4;}\n\n.message-bubble{position:relative;max-width:75%;word-break:break-word;}\n.message-bubble .content{padding:10px 14px;font-size:14px;line-height:1.6;word-break:break-word;}\n\n/* ===== \u6ce8\u5165\u7528\u6237CSS ===== */\n${cssContent}\n<\/style><\/head><body>\n<div class=\"chat-wrap\">\n\n  <div class=\"message-wrapper ai received char\">\n    <div class=\"avatar\">\ud83e\udd16<\/div>\n    <div class=\"message-bubble ai received char\">\n      <div class=\"content\">\u4f60\u597d\uff01\u6211\u662f AI\uff0c\u5f88\u9a
