Press(); };\n                card.addEventListener('touchstart', startPress, { passive: true });\n                card.addEventListener('touchend', cancelPress);\n                card.addEventListener('touchmove', onMove, { passive: true });\n                card.addEventListener('mousedown', startPress);\n                card.addEventListener('mouseup', cancelPress);\n                card.addEventListener('mouseleave', cancelPress);\n                card.onclick = (e) => { if (e.target === cb) return; cb.checked = !cb.checked; };\n                container.appendChild(card);\n            });\n        }\n\n        // ============================================================\n        // \u2605\u2605\u2605 \u4e16\u754c\u4e66\u903b\u8f91\uff08\u590d\u523b\u89d2\u8272\u5361\uff09\u2605\u2605\u2605\n        // ============================================================\n        let loreViewMode = 'grid-view';\n        function switchLoreView(v) {\n            loreViewMode = v;\n            document.getElementById('lore-container').className = v;\n        }\n        function loreMkdir() { openMkdirModal(loreState.tree, () => renderLoreCards()); }\n        function loreToggleSelectAll() {\n            const cbs = document.querySelectorAll('#lore-container .card-checkbox');\n            const all = Array.from(cbs).every(c => c.checked);\n            cbs.forEach(c => c.checked = !all);\n        }\n        function loreOpenMoveModal() {\n            const checked = document.querySelectorAll('#lore-container .card-checkbox:checked');\n            if (!checked.length) return showToast('\u8bf7\u5148\u52fe\u9009\u6761\u76ee\uff01', 'error');\n            openMoveTreeModal({\n                tree: loreState.tree,\n                getSelectedItems: () => Array.from(checked).map(cb => loreState.cards.find(c => c.id === cb.dataset.id)).filter(Boolean),\n                doMove: (targetId) => {\n                    checked.forEach(cb => {\n                        const c = loreState.cards.find(x => x.id === cb.dataset.id);\n                        if (c) c.folderId = targetId;\n                    });\n                    renderLoreCards();\n                    showToast('\u5df2\u79fb\u52a8 ' + checked.length + ' \u4e2a\u6761\u76ee');\n                }\n            });\n        }\n        function loreDeleteSelected() {\n            const checked = document.querySelectorAll('#lore-container .card-checkbox:checked');\n            if (!checked.length) return showToast('\u8bf7\u5148\u52fe\u9009\u6761\u76ee\uff01', 'error');\n            if (confirm('\u786e\u5b9a\u5220\u9664\u9009\u4e2d\u7684 ' + checked.length + ' \u4e2a\u6761\u76ee\uff1f')) {\n                const ids = Array.from(checked).map(cb => cb.dataset.id);\n                loreState.cards = loreState.cards.filter(c => !ids.includes(c.id));\n                renderLoreCards();\n                showToast('\u5df2\u5220\u9664 ' + ids.length + ' \u4e2a', 'error');\n            }\n        }\n\n        // \u4e16\u754c\u4e66\u5bfc\u5165\uff08\u652f\u6301 json/png/txt/docx/doc/pdf\uff09\n        document.getElementById('lorebook-upload').addEventListener('change', async function(event) {\n            const files = event.target.files;\n            if (!files.length) return;\n            openModal('loading-modal');\n            for (const file of files) {\n                const name = file.name.replace(/\\.\\w+$/, '') || file.name;\n                const ext = file.name.split('.').pop().toLowerCase();\n                try {\n                    if (ext === 'json') {\n                        const text = await file.text();\n                        try {\n                            const jsonData = JSON.parse(text);\n                            let displayName = jsonData.name || name;\n                            let description = '';\n\n                            if (jsonData.entries) {\n                                const entries = Array.isArray(jsonData.entries)\n                                    ? jsonData.entries\n                                    : Object.values(jsonData.entries);\n                                description = entries.map(e => {\n                                    const title = e.comment || (Array.isArray(e.key) ? e.key.join(', ') : e.key) || '';\n                                    return (title ? '\u3010' + title + '\u3011\\n' : '') + (e.content || '');\n                                }).filter(s => s.trim()).join('\\n\\n\u2500\u2500\u2500\u2500\u2500\u2500\\n\\n');\n                            } else if (jsonData.items && Array.isArray(jsonData.items)) {\n                                description = jsonData.items.map(item => {\n                                    const enabled = item.enabled === false ? ' [\u5df2\u7981\u7528]' : '';\n                                    return '\u3010' + (item.name || '\u65e0\u6807\u9898') + enabled + '\u3011\\n' + (item.content || '\uff08\u65e0\u5185\u5bb9\uff09');\n                                }).join('\\n\\n\u2500\u2500\u2500\u2500\u2500\u2500\\n\\n');\n                            } else if (jsonData.description || (jsonData.data && jsonData.data.description)) {\n                                description = jsonData.description || jsonData.data.description;\n                            } else {\n                                description = JSON.stringify(jsonData, null, 2);\n                            }\n\n                            addLoreData({ name: displayName, description }, null);\n                            showToast('\u5df2\u5bfc\u5165: ' + displayName);\n                        } catch {\n                            addLoreData({ name, description: text }, null);\n                            showToast('\u5df2\u5bfc\u5165(\u539f\u6587): ' + name);\n                        }\n\n                    } else if (ext === 'png') {\n                        const buf = await file.arrayBuffer();\n                        const jsonData = parsePngChunk(buf);\n                        if (jsonData) { addLoreData(jsonData, URL.createObjectURL(file)); showToast('\u5df2\u5bfc\u5165: ' + name); }\n                        else showToast('\u6b64PNG\u4e0d\u542b\u89d2\u8272\u6570\u636e: ' + name, 'error');\n\n                    } else if (ext === 'txt') {\n                        const text = await file.text();\n                        addLoreData({ name, description: text.trim() }, null);\n                        showToast('\u5df2\u5bfc\u5165: ' + name);\n\n                    } else if (ext === 'docx' || ext === 'doc') {\n                        const buf = await file.arrayBuffer();\n                        const result = await mammoth.extractRawText({ arrayBuffer: buf });\n                        addLoreData({ name, description: result.value.trim() }, null);\n                        showToast('\u5df2\u5bfc\u5165: ' + name);\n\n                    } else if (ext === 'pdf') {\n                        const description = await extractPdfText(file);\n                        addLoreData({ name, description }, null);\n                        showToast('\u5df2\u5bfc\u5165: ' + name);\n\n                    } else {\n                        const text = await file.text().catch(() => '');\n                        addLoreData({ name, description: text.trim() }, null);\n                        showToast('\u5df2\u5bfc\u5165: ' + name);\n                    }\n                } catch(err) {\n                    showToast('\u5bfc\u5165\u5931\u8d25: ' + file.name, 'error');\n                    console.error(err);\n                }\n            }\n            event.target.value = '';\n            renderLoreCards();\n            closeModal('loading-modal');\n            showToast('\u5df2\u5bfc\u5165\uff0c\u5f53\u524d\u5171 ' + loreState.cards.length + ' \u4e2a\u6761\u76ee');\n        });\n\n        // PDF \u6587\u5b57\u63d0\u53d6\uff08\u6309\u9700\u52a0\u8f7d pdf.js\uff09\n        async function extractPdfText(file) {\n            // \u52a8\u6001\u52a0\u8f7d pdf.js\n            if (!window.pdfjsLib) {\n                await new Promise((resolve, reject) => {\n                    const s = document.createElement('script');\n                    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';\n                    s.onload = resolve; s.onerror = reject;\n                    document.head.appendChild(s);\n                });\n                window.pdfjsLib.GlobalWorkerOptions.workerSrc =\n                    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';\n            }\n            try {\n                const buf = await file.arrayBuffer();\n                const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;\n                let fullText = '';\n                for (let i = 1; i <= pdf.numPages; i++) {\n                    const page = await pdf.getPage(i);\n                    const content = await page.getTextContent();\n                    const pageText = content.items.map(item => item.str).join(' ');\n                    fullText += pageText + (i < pdf.numPages ? '\\n\\n' : '');\n                }\n                return fullText.trim() || '[PDF\u5185\u5bb9\u4e3a\u7a7a\u6216\u65e0\u6cd5\u63d0\u53d6\u6587\u5b57]';\n            } catch(e) {\n                console.error('PDF\u63d0\u53d6\u5931\u8d25:', e);\n                return '[PDF\u89e3\u6790\u5931\u8d25\uff0c\u53ef\u80fd\u662f\u626b\u63cf\u4ef6\u6216\u52a0\u5bc6\u6587\u4ef6]';\n            }\n        }\n\n        function addLoreData(jsonData, imageUrl) {\n            const name = jsonData.name || (jsonData.data && jsonData.data.name) || '\u672a\u77e5\u6761\u76ee';\n            const desc = jsonData.description || (jsonData.data && jsonData.data.description) || '';\n            loreState.cards.push({\n                id: 'lore_' + Date.now() + '_' + Math.floor(Math.random() * 1000),\n                name, initial: name.charAt(0).toUpperCase(),\n                description: desc,\n                color: colors[Math.floor(Math.random() * colors.length)],\n                folderId: loreState.tree.currentId,\n                imageUrl\n            });\n        }\n\n        function openLoreModal(card) {\n            document.getElementById('lore-modal-title').innerText = card.name;\n            document.getElementById('lore-modal-body').innerText = card.description;\n            const btn = document.getElementById('lore-copy-btn');\n            btn.innerHTML = '<svg viewBox=\"0 0 24 24\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\" ry=\"2\"><\/rect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\/path><\/svg> \u590d\u5236\u4e16\u754c\u4e66';\n            btn.className = 'btn btn-secondary';\n            openModal('lore-modal');\n        }\n        function copyLoreContent() {\n            const text = document.getElementById('lore-modal-body').innerText;\n            navigator.clipboard.writeText(text).then(() => {\n                const btn = document.getElementById('lore-copy-btn');\n                btn.innerHTML = '<svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"><\/polyline><\/svg> \u5df2\u590d\u5236\uff01';\n                btn.className = 'btn';\n                setTimeout(() => {\n                    btn.innerHTML = '<svg viewBox=\"0 0 24 24\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\" ry=\"2\"><\/rect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\/path><\/svg> \u590d\u5236\u4e16\u754c\u4e66';\n                    btn.className = 'btn btn-secondary';\n                }, 2000);\n            }).catch(() => {\n                const ta = document.createElement('textarea');\n                ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';\n                document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();\n                showToast('\u5df2\u590d\u5236\u5230\u526a\u8d34\u677f');\n            });\n        }\n\n        function renderLoreCards() {\n            renderBreadcrumb(loreState.tree, 'lore-breadcrumb', (action) => {\n                if (action === 'delete') deleteFolderNode(loreState.tree.currentId, loreState.tree, renderLoreCards);\n                else renderLoreCards();\n            });\n            const container = document.getElementById('lore-container');\n            container.className = loreViewMode;\n            container.innerHTML = '';\n            const curId = loreState.tree.currentId;\n            const subFolders = loreState.tree.children(curId);\n            subFolders.forEach(folder => {\n                const card = document.createElement('div');\n                card.className = 'folder-card';\n                const delBtn = document.createElement('button');\n                delBtn.className = 'folder-card-del'; delBtn.innerHTML = '\u2715';\n                delBtn.onclick = (e) => { e.stopPropagation(); deleteFolderNode(folder.id, loreState.tree, renderLoreCards); };\n                const icon = document.createElement('div'); icon.className = 'folder-icon'; icon.innerHTML = '\ud83d\udcd6';\n                const name = document.createElement('div'); name.className = 'card-name'; name.textContent = folder.name;\n                card.appendChild(delBtn); card.appendChild(icon); card.appendChild(name);\n                card.onclick = () => { loreState.tree.currentId = folder.id; renderLoreCards(); };\n                container.appendChild(card);\n            });\n            const visible = loreState.cards.filter(c => c.folderId === curId);\n            if (subFolders.length === 0 && visible.length === 0) {\n                container.innerHTML = '<p style=\"text-align:center;width:100%;color:var(--text-muted);padding:40px 20px;\">\u5f53\u524d\u6587\u4ef6\u5939\u4e3a\u7a7a\uff0c\u70b9\u51fb\u300c\u5bfc\u5165\u4e16\u754c\u4e66\u300d\u6216\u300c\u65b0\u5efa\u6587\u4ef6\u5939\u300d\u5f00\u59cb<\/p>';\n                return;\n            }\n            visible.forEach(card => {\n                const cardEl = document.createElement('div');\n                cardEl.className = 'card';\n                cardEl.onclick = () => openLoreModal(card);\n                const avatarHtml = card.imageUrl\n                    ? `<img src=\"${card.imageUrl}\" class=\"image-avatar\" alt=\"\">`\n                    : `<div class=\"text-avatar\" style=\"color:${card.color}\">${card.initial}<\/div>`;\n                cardEl.innerHTML = `\n                    <input type=\"checkbox\" class=\"card-checkbox\" data-id=\"${card.id}\" onclick=\"event.stopPropagation()\">\n                    ${avatarHtml}\n                    <div class=\"card-info\"><h4 class=\"card-name\">${card.name}<\/h4><\/div>`;\n                container.appendChild(cardEl);\n            });\n        }\n\n        // ============================================================\n        // \u2605 \u65e7\u7248 renderCards \u8986\u76d6\uff08\u65b0\u7248\u5df2\u5728 appState \u533a\u5757\u5b9a\u4e49\uff09\n        // ============================================================\n\n        window.onload = function() { initApp(); setupPWA(); renderHtmlCards(); renderThemeCards(); renderLoreCards(); };\n    <\/script>\n<\/body>\n<\/html>\n";
let resourceLoaded = false;
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'api') { renderApiAll(); updateApiStats(); updateApiGroupFilter(); }
  if (name === 'resource' && !resourceLoaded) {
    resourceLoaded = true;
    document.getElementById('resourceFrame').srcdoc = ST_HTML;
  }
}

// ============================================================
// 主页 - 手机导航
// ============================================================
const EMOJIS = ['📱','💻','🐱','🌿','✨','🎮','🌸','🍀','🦋','🌙','⭐','🎀','🔮','🍃','🌺','🐾','💚','🫧','🌊','🍵','🎵','🌈'];
let selectedEmoji = '📱';
let editMode = false;

function getPhones() {
  try { return JSON.parse(localStorage.getItem('phoneLinks') || '[]'); } catch { return []; }
}
function savePhones(arr) { localStorage.setItem('phoneLinks', JSON.stringify(arr)); }

function renderPhoneCards() {
  const grid = document.getElementById('phoneGrid');
  const q = document.getElementById('homeSearch').value.toLowerCase();
  const phones = getPhones().filter(l => l.name.toLowerCase().includes(q) || l.url.toLowerCase().includes(q));
  if (phones.length === 0) {
    grid.innerHTML = `<div class="home-empty">${q ? '没找到呢…' : '还没有小手机，快加一个吧 🌿'}</div>`;
    return;
  }
  grid.innerHTML = phones.map((l, i) => `
    <div class="phone-card" style="animation-delay:${i*0.04}s" onclick="handlePhoneClick(event,'${escAttr(l.url)}')">
      <button class="delete-btn-home" onclick="deletePhone(event,${i})">✕</button>
      <div class="card-icon-home">${l.emoji||'📱'}</div>
      <div class="card-name-home">${escHtml(l.name)}</div>
    </div>
  `).join('');
}

function handlePhoneClick(e, url) {
  if (editMode) return;
  e.preventDefault();
  window.open(url, '_blank');
}

function deletePhone(e, idx) {
  e.stopPropagation();
  const arr = getPhones(); arr.splice(idx, 1); savePhones(arr); renderPhoneCards();
}

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('editBtn').textContent = editMode ? '✓ 完成' : '✏️ 整理';
}

function openHomeModal() {
  document.getElementById('homeModalOverlayEl').classList.add('open');
  document.getElementById('phoneName').value = '';
  document.getElementById('phoneUrl').value = '';
  selectedEmoji = '📱';
  renderEmojiGrid();
  document.getElementById('phoneName').focus();
}
function closeHomeModal() { document.getElementById('homeModalOverlayEl').classList.remove('open'); }
function handleHomeOverlayClick(e) { if (e.target === document.getElementById('homeModalOverlayEl')) closeHomeModal(); }

function renderEmojiGrid() {
  document.getElementById('emojiGridHome').innerHTML = EMOJIS.map(em =>
    `<button class="emoji-btn-home ${em===selectedEmoji?'selected':''}" onclick="selectEmoji('${em}')">${em}</button>`
  ).join('');
}
function selectEmoji(em) { selectedEmoji = em; renderEmojiGrid(); }

function savePhone() {
  const name = document.getElementById('phoneName').value.trim();
  let url = document.getElementById('phoneUrl').value.trim();
  if (!name || !url) { toast('⚠️ 名称和网址都要填哦～'); return; }
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  const arr = getPhones();
  arr.push({ name, url, emoji: selectedEmoji });
  savePhones(arr); closeHomeModal(); renderPhoneCards();
  toast('✅ 已添加～');
}

// ============================================================
// API Vault
// ============================================================
let apiData = JSON.parse(localStorage.getItem('api-vault-data') || '[]');
let apiEditingId = null;
let apiMaskKey = {};

function saveApiData() {
  localStorage.setItem('api-vault-data', JSON.stringify(apiData));
  renderApiAll(); updateApiStats(); updateApiGroupFilter();
}
function genId() { return Date.now() + Math.random().toString(36).slice(2); }

// 主题
let apiTheme = localStorage.getItem('api-vault-theme') || 'light';
function applyApiTheme() {
  document.documentElement.setAttribute('data-theme', apiTheme);
  document.getElementById('apiThemeBtn').textContent = apiTheme === 'dark' ? '☀️' : '🌙';
}
applyApiTheme();
document.getElementById('apiThemeBtn').onclick = () => {
  apiTheme = apiTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('api-vault-theme', apiTheme);
  applyApiTheme();
};

function openApiModal(id = null) {
  apiEditingId = id;
  document.getElementById('apiModalTitle').textContent = id ? '编辑 API' : '添加 API';
  ['f-name','f-url','f-key','f-model','f-note','f-newgroup'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('f-newgroup').classList.remove('show');
  rebuildApiGroupSelect();
  if (id) {
    const e = apiData.find(x => x.id === id);
    if (e) {
      document.getElementById('f-name').value = e.name;
      document.getElementById('f-url').value = e.url;
      document.getElementById('f-key').value = e.key;
      document.getElementById('f-model').value = e.model || '';
      document.getElementById('f-note').value = e.note || '';
      const sel = document.getElementById('f-group');
      const opt = [...sel.options].find(o => o.value === e.group);
      if (opt) sel.value = e.group;
    }
  }
  document.getElementById('apiModalOverlayEl').classList.add('open');
}
function closeApiModal() { document.getElementById('apiModalOverlayEl').classList.remove('open'); apiEditingId = null; }
function handleApiOverlayClick(e) { if (e.target === document.getElementById('apiModalOverlayEl')) closeApiModal(); }

function rebuildApiGroupSelect() {
  const groups = [...new Set(apiData.map(x => x.group).filter(Boolean))];
  const sel = document.getElementById('f-group');
  sel.innerHTML = '<option value="__new__">＋ 新建分组</option>';
  groups.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o); });
  if (groups.length > 0) sel.value = groups[0];
  else { sel.value = '__new__'; document.getElementById('f-newgroup').classList.add('show'); }
}

function handleApiGroupChange() {
  const v = document.getElementById('f-group').value;
  document.getElementById('f-newgroup').classList.toggle('show', v === '__new__');
}

function saveApiEntry() {
  const name = document.getElementById('f-name').value.trim();
  const url = document.getElementById('f-url').value.trim();
  const key = document.getElementById('f-key').value.trim();
  const model = document.getElementById('f-model').value.trim();
  const note = document.getElementById('f-note').value.trim();
  let group = document.getElementById('f-group').value;
  if (group === '__new__') group = document.getElementById('f-newgroup').value.trim();
  if (!name) { toast('⚠️ 请填写名称'); return; }
  if (!url) { toast('⚠️ 请填写 API 地址'); return; }
  if (!key) { toast('⚠️ 请填写密钥'); return; }
  if (!group) { toast('⚠️ 请填写分组'); return; }
  if (apiEditingId) {
    const idx = apiData.findIndex(x => x.id === apiEditingId);
    if (idx >= 0) apiData[idx] = { ...apiData[idx], name, url, key, model, note, group };
    toast('✅ 已更新');
  } else {
    apiData.push({ id: genId(), name, url, key, model, note, group, created: Date.now() });
    toast('✅ 已添加');
  }
  saveApiData(); closeApiModal();
}

function deleteApiEntry(id) {
  if (!confirm('确定要删除这条 API 吗？')) return;
  apiData = apiData.filter(x => x.id !== id);
  saveApiData(); toast('🗑️ 已删除');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘'; btn.classList.remove('copied'); }, 1500);
  });
  toast('📋 已复制到剪贴板');
}

function toggleApiMask(id) { apiMaskKey[id] = !apiMaskKey[id]; renderApiAll(); }

function maskStr(s) {
  if (!s) return '—';
  if (s.length <= 8) return '•'.repeat(s.length);
  return s.slice(0,4) + '•'.repeat(Math.min(s.length-8,16)) + s.slice(-4);
}

function getApiGroups() {
  const q = document.getElementById('apiSearchInput').value.toLowerCase();
  const gf = document.getElementById('apiGroupFilter').value;
  let filtered = apiData;
  if (q) filtered = filtered.filter(x =>
    x.name.toLowerCase().includes(q) || (x.model||'').toLowerCase().includes(q) ||
    (x.url||'').toLowerCase().includes(q) || (x.note||'').toLowerCase().includes(q)
  );
  if (gf) filtered = filtered.filter(x => x.group === gf);
  const groups = {};
  filtered.forEach(e => { if (!groups[e.group]) groups[e.group] = []; groups[e.group].push(e); });
  return groups;
}

function renderApiAll() {
  const groups = getApiGroups();
  const container = document.getElementById('apiMainContent');
  const empty = document.getElementById('apiEmptyState');
  container.innerHTML = '';
  if (Object.keys(groups).length === 0) { empty.classList.add('show'); return; }
  empty.classList.remove('show');
  Object.entries(groups).forEach(([group, entries]) => {
    const sec = document.createElement('div');
    sec.className = 'group-section';
    sec.innerHTML = `
      <div class="group-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="group-label">${escHtml(group)}</div>
        <div class="group-line"></div>
        <div class="group-count">${entries.length}</div>
        <div class="group-toggle">▾</div>
      </div>
      <div class="group-cards" id="cards-${group}"></div>
    `;
    const cards = sec.querySelector('.group-cards');
    entries.forEach(e => {
      const isMasked = !apiMaskKey[e.id];
      const card = document.createElement('div');
      card.className = 'api-card';
      card.innerHTML = `
        <div class="card-top">
          <div class="card-name">${escHtml(e.name)}</div>
          <div class="card-actions">
            <button class="btn-icon" title="编辑" onclick="openApiModal('${e.id}')">✎</button>
            <button class="btn-icon danger" title="删除" onclick="deleteApiEntry('${e.id}')">✕</button>
          </div>
        </div>
        <div class="card-field">
          <div class="field-label">API 地址</div>
          <div class="field-value">
            <span class="field-text" title="${escHtml(e.url)}">${escHtml(e.url)}</span>
            <button class="btn-copy" title="复制" onclick="copyText('${escAttr(e.url)}',this)">⎘</button>
          </div>
        </div>
        <div class="card-field">
          <div class="field-label">密钥 <small style="color:var(--text3);font-size:10px;cursor:pointer" onclick="toggleApiMask('${e.id}')">${isMasked?'👁 显示':'🔒 隐藏'}</small></div>
          <div class="field-value">
            <span class="field-text ${isMasked?'masked':''}">${isMasked?maskStr(e.key):escHtml(e.key)}</span>
            <button class="btn-copy" title="复制" onclick="copyText('${escAttr(e.key)}',this)">⎘</button>
          </div>
        </div>
        ${e.model?`<div class="card-field"><div class="field-label">模型</div><span class="model-tag">${escHtml(e.model)}</span></div>`:''}
        ${e.note?`<div class="card-field"><div class="field-label">备注</div><div class="field-value"><span class="field-text" style="white-space:normal">${escHtml(e.note)}</span></div></div>`:''}
      `;
      cards.appendChild(card);
    });
    container.appendChild(sec);
  });
}

function updateApiStats() {
  const groups = [...new Set(apiData.map(x => x.group).filter(Boolean))];
  document.getElementById('apiStatsBar').innerHTML = `
    <div class="stat-item"><span class="stat-num">${apiData.length}</span> 个 API</div>
    <div class="stat-item"><span class="stat-num">${groups.length}</span> 个分组</div>
  `;
}

function updateApiGroupFilter() {
  const groups = [...new Set(apiData.map(x => x.group).filter(Boolean))];
  const sel = document.getElementById('apiGroupFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部分组</option>';
  groups.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o); });
  if (cur && groups.includes(cur)) sel.value = cur;
}

// 键盘
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeApiModal(); closeHomeModal(); }
});

// ============================================================
// 初始化
// ============================================================
document.getElementById('editBtn').addEventListener('click', toggleEdit);
document.getElementById('btnAdd').addEventListener('click', openHomeModal);
document.getElementById('btnApi').addEventListener('click', function(){ showPage('api'); });
document.getElementById('btnResource').addEventListener('click', function(){ showPage('resource'); });

// 返回主页按钮（资源页和API页）
document.querySelectorAll('[data-back]').forEach(function(el){
  el.addEventListener('click', function(){ showPage('home'); });
});

// overlay点击关闭
var apiOverlay = document.getElementById('apiModalOverlayEl');
if(apiOverlay) apiOverlay.addEventListener('click', handleApiOverlayClick);
var homeOverlay = document.getElementById('homeModalOverlayEl');
if(homeOverlay) homeOverlay.addEventListener('click', handleHomeOverlayClick);

renderEmojiGrid();
renderPhoneCards();
</script>
